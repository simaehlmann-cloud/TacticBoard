name: Build Android APK (Bubblewrap)

on:
  push:
    branches:
      - main  # Oder master, falls dein Branch so heißt

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18

    - name: Install Bubblewrap CLI
      run: npm install -g @bubblewrap/cli

    - name: Initialize and Build APK (Automated)
      run: |
        # Wir erstellen eine automatisierte Konfiguration, damit Bubblewrap keine Fragen stellt
        bubblewrap init --manifest=./manifest.json --metaInfo=./twa-manifest.json --yes
        
        # Build-Prozess mit automatischen Bestätigungen ausführen
        bubblewrap build --acceptToS --yes
        
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Taktiktafel-App
        path: ./*.apk
